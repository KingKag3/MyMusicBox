      <text x="432" y="480" fill="#ffffff" font-weight="500">Be Alright</text>
      <text x="432" y="496" font-size="11.5" fill="#727272">Ariana Grande</text>
      <text x="620" y="488" fill="#b3b3b3">Ariana Grande</text>
      <text x="800" y="488" fill="#b3b3b3">Dangerous Woman</text>
      <text x="960" y="488" fill="#727272">3:22</text>
      <text x="1020" y="488" fill="#535353" font-size="14">✏️ 🎵 ＋ 🗑</text>
