    <rect x="500" y="694" width="90" height="3" rx="1.5" fill="#1db954"/>
    <text x="730" y="700" font-size="11" fill="#727272">3:55</text>

    <rect x="1080" y="646" width="100" height="28" rx="14" fill="#1db95422" stroke="#1db954"/>
