    <rect x="0" y="630" width="1200" height="1" fill="#ffffff12"/>
    <rect x="20" y="647" width="56" height="56" rx="6" fill="#3a2f10"/>
    <text x="48" y="682" font-size="20" text-anchor="middle" fill="#e0b84a">🎵</text>
    <text x="90" y="670" font-size="13" font-weight="700" fill="#ffffff">All The Stars</text>
