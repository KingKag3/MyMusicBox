<svg viewBox="0 0 1200 720" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <clipPath id="round"><rect x="0" y="0" width="1200" height="720" rx="12"/></clipPath>
  </defs>
  <g clip-path="url(#round)">
